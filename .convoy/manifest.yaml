# Convoy manifest for shipd
# This file records which deployment-surface files Convoy owns.
# Convoy will only modify paths listed here. Everything else is developer-owned.

version: 1
project: shipd
platform: vercel
framework: next.js
runtime: node-20
packageManager: npm

owned:
  - path: .env.schema
    purpose: declares required runtime environment variables

notOwned:
  - src/**
  - prisma/**
  - package.json
  - vercel.json
  - next.config.ts
